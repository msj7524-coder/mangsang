<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>망상 빈자리 알림</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f5f7fb; color: #111827; }
    header { background: #1f2937; color: white; padding: 18px 22px; }
    main { max-width: 1380px; margin: 0 auto; padding: 18px; }
    .grid { display: grid; grid-template-columns: minmax(280px, 0.9fr) minmax(520px, 1.45fr) minmax(340px, 1.05fr); gap: 14px; }
    .card { background: white; border: 1px solid #d8dee9; border-radius: 8px; padding: 14px; }
    .summary-card { min-height: 300px; }
    .wide { grid-column: 1 / -1; }
    h1 { font-size: 22px; margin: 0; }
    h2 { font-size: 16px; margin: 0 0 10px; }
    .status { display: inline-block; padding: 5px 10px; border-radius: 999px; font-weight: 700; }
    .ok { background: #dcfce7; color: #166534; }
    .late { background: #fef9c3; color: #854d0e; }
    .off { background: #fee2e2; color: #991b1b; }
    .status-panel { margin-top: 12px; display: grid; gap: 8px; }
    .info-row { display: grid; grid-template-columns: 82px 1fr; gap: 10px; align-items: start; font-size: 14px; }
    .info-label { color: #6b7280; font-weight: 700; }
    .info-value { color: #111827; line-height: 1.45; word-break: keep-all; overflow-wrap: anywhere; }
    .count-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .count-badge { border: 1px solid #e5e7eb; background: #f9fafb; border-radius: 999px; padding: 5px 9px; font-size: 13px; font-weight: 700; }
    .count-available { color: #047857; }
    .count-canceling { color: #b91c1c; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 8px 6px; text-align: left; vertical-align: top; }
    th { color: #4b5563; background: #f9fafb; }
    .table-wrap { height: 260px; max-height: 260px; overflow-y: auto; border: 1px solid #eef2f7; border-radius: 6px; }
    .table-wrap thead th { position: sticky; top: 0; z-index: 3; box-shadow: 0 1px 0 #e5e7eb; }
    .scroll-box { height: 245px; max-height: 245px; overflow-y: auto; border: 1px solid #eef2f7; border-radius: 6px; padding: 8px; line-height: 1.65; }
    .available-box { height: 245px; max-height: 245px; }
    .compact-table { font-size: 13px; }
    .compact-table th, .compact-table td { padding: 5px 4px; white-space: nowrap; }
    .compact-table thead th { position: sticky; top: 0; z-index: 4; background: #f9fafb; box-shadow: 0 1px 0 #e5e7eb; }
    .expected-soon { color: #b91c1c; font-weight: 700; }
    .expected-past { color: #854d0e; font-weight: 700; }
    .muted { color: #6b7280; }
    .event-canceling { color: #b91c1c; font-weight: 700; }
    .event-available { color: #047857; font-weight: 700; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><h1>🏕️ 망상 빈자리 알림</h1></header>
  <main class="grid">
    <section class="card summary-card">
      <h2>감시 상태</h2>
      <div id="status"></div>
      <div id="statusDetail" class="status-panel"></div>
    </section>
    <section class="card summary-card">
      <h2>현재 취소진행중</h2>
      <div id="cancelingNow" class="muted scroll-box">불러오는 중...</div>
    </section>
    <section class="card summary-card">
      <h2>현재 예약가능</h2>
      <div id="availableNow" class="muted scroll-box available-box">불러오는 중...</div>
    </section>
    <section class="card wide">
      <h2>최근 이력 <span id="eventCount" class="muted"></span></h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>시간</th><th>종류</th><th>상태</th><th>날짜</th><th>시설</th><th>객실</th></tr>
          </thead>
          <tbody id="events"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    function localTime(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("ko-KR", { hour12: false });
    }
    function statusInfo(heartbeat) {
      if (!heartbeat || !heartbeat.received_at) return ["중지됨", "off"];
      const age = (Date.now() - new Date(heartbeat.received_at).getTime()) / 1000;
      if (heartbeat.status === "login_required") return ["로그인 필요", "late"];
      if (heartbeat.status === "stopped" || heartbeat.status === "ended") return ["중지됨", "off"];
      if (age <= 300) return ["감시 중", "ok"];
      if (age <= 900) return ["지연", "late"];
      return ["중지됨", "off"];
    }
    function dateSummary(dates) {
      if (!dates || !dates.length) return "-";
      const sorted = [...dates].sort();
      if (sorted.length === 1) return sorted[0];
      let continuous = true;
      for (let i = 1; i < sorted.length; i++) {
        const prev = new Date(sorted[i - 1] + "T00:00:00");
        const cur = new Date(sorted[i] + "T00:00:00");
        const diffDays = Math.round((cur - prev) / 86400000);
        if (diffDays !== 1) { continuous = false; break; }
      }
      if (continuous) return `${sorted[0]} ~ ${sorted[sorted.length - 1]} (${sorted.length}일)`;
      if (sorted.length <= 5) return sorted.join(", ");
      return `${sorted.slice(0, 4).join(", ")} 외 ${sorted.length - 4}일`;
    }
    function timeOnly(value) {
      if (!value) return "-";
      return new Date(value).toLocaleTimeString("ko-KR", { hour12: false, hour: "2-digit", minute: "2-digit" });
    }
    function remainText(expected) {
      if (!expected) return "-";
      const diff = expected.getTime() - Date.now();
      const totalMinutes = Math.max(0, Math.round(Math.abs(diff) / 60000));
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      const text = hours ? `${hours}시간 ${minutes}분` : `${minutes}분`;
      return diff < 0 ? `예상 지남 ${text}` : text;
    }
    function remainClass(expected) {
      if (!expected) return "";
      const diff = expected.getTime() - Date.now();
      if (diff < 0) return "expected-past";
      if (diff <= 10 * 60 * 1000) return "expected-soon";
      return "";
    }
    function renderCancelingNow(items) {
      if (!items.length) return "현재 취소진행중 없음";
      const rows = items.map((item) => {
        const detected = item.detected_at ? new Date(item.detected_at) : null;
        const expected = detected ? new Date(detected.getTime() + 2 * 60 * 60 * 1000) : null;
        return `<tr>
          <td>${item.target_date}</td>
          <td>${item.facility}</td>
          <td>${item.room}</td>
          <td>${timeOnly(detected)}</td>
          <td>${timeOnly(expected)}</td>
          <td class="${remainClass(expected)}">${remainText(expected)}</td>
        </tr>`;
      }).join("");
      return `<table class="compact-table canceling-table">
        <thead><tr><th>날짜</th><th>시설</th><th>객실</th><th>감지</th><th>예상</th><th>남은시간</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }
    function renderAvailableNow(items) {
      if (!items.length) return "현재 예약가능 없음";
      const rows = items.map((item) => `<tr>
        <td>${item.target_date}</td>
        <td>${item.facility}</td>
        <td>${item.room}</td>
      </tr>`).join("");
      return `<table class="compact-table">
        <thead><tr><th>날짜</th><th>시설</th><th>객실</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }
    async function refresh() {
      const res = await fetch("/api/state", { cache: "no-store" });
      const data = await res.json();
      const hb = data.heartbeat;
      const [label, cls] = statusInfo(hb);
      document.getElementById("status").innerHTML = `<span class="status ${cls}">${label}</span>`;
      document.getElementById("statusDetail").innerHTML = hb
        ? `<div class="info-row"><div class="info-label">마지막</div><div class="info-value">${localTime(hb.received_at)}</div></div>
           <div class="info-row"><div class="info-label">감시 이름</div><div class="info-value">${hb.client || "-"}</div></div>
           <div class="info-row"><div class="info-label">감시 날짜</div><div class="info-value">${dateSummary(hb.target_dates)}</div></div>
           <div class="info-row"><div class="info-label">시설</div><div class="info-value">${(hb.facilities || []).join(", ") || "-"}</div></div>
           <div class="count-row">
             <span class="count-badge count-available">예약가능 ${hb.available_count ?? "-"}건</span>
             <span class="count-badge count-canceling">취소진행중 ${hb.canceling_count ?? "-"}건</span>
           </div>
           ${hb.message ? `<div class="info-row"><div class="info-label">메시지</div><div class="info-value">${hb.message}</div></div>` : ""}`
        : `<div class="muted">아직 신호 없음</div>`;
      document.getElementById("cancelingNow").innerHTML = renderCancelingNow(hb?.canceling_items || []);
      document.getElementById("availableNow").innerHTML = renderAvailableNow(hb?.available_items || []);
      const recentEvents = (data.events || []).slice().reverse().slice(0, 80);
      document.getElementById("eventCount").textContent = data.events.length
        ? `(최근 ${recentEvents.length}개 / 전체 ${data.events.length}개)`
        : "";
      document.getElementById("events").innerHTML = recentEvents.map((ev) => {
        const cls = ev.event_type === "canceling" ? "event-canceling" : "event-available";
        const type = ev.event_type === "canceling" ? "취소진행중" : "예약가능";
        return `<tr>
          <td>${localTime(ev.received_at)}</td>
          <td class="${cls}">${type}</td>
          <td>${ev.state || ""}</td>
          <td>${ev.target_date || ""}</td>
          <td>${ev.facility || ""}</td>
          <td>${ev.room || ""}</td>
        </tr>`;
      }).join("");
    }
    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
